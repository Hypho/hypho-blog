{{- /* Mermaid 图表支持 - 全局加载 */}}
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    mermaid.initialize({
        startOnLoad: true,
        securityLevel: 'loose',
        theme: 'default'
    });

    // 手动渲染 mermaid 代码块
    document.addEventListener('DOMContentLoaded', async () => {
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid, pre.mermaid');
        for (const block of mermaidBlocks) {
            const pre = block.parentElement;
            const graphDefinition = block.textContent;
            const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
            const div = document.createElement('div');
            div.classList.add('mermaid');
            div.id = id;
            div.textContent = graphDefinition;
            pre.parentNode.replaceChild(div, pre);
        }
        await mermaid.run();
    });
</script>

{{- /* 官方推荐 CDN (jsdelivr) - 最新稳定版 0.16.21 */}}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js" crossorigin="anonymous"
    onload="renderMathInElement(document.body, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError : false
    });"></script>
{{- end }}
