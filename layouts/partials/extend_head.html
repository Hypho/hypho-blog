{{- if or .Params.math .Site.Params.math }}
{{- $katex_css := "katex/katex.min.css" | relURL }}
{{- $katex_js := "katex/katex.min.js" | relURL }}
{{- $katex_auto_render := "katex/contrib/auto-render.min.js" | relURL }}

{{- /* 预加载核心字体以防止浏览器 Slow Network 干预 */}}
<link rel="preload" href="{{ "katex/fonts/KaTeX_Main-Regular.woff2" | relURL }}" as="font" type="font/woff2" crossorigin="anonymous">
<link rel="preload" href="{{ "katex/fonts/KaTeX_Math-Italic.woff2" | relURL }}" as="font" type="font/woff2" crossorigin="anonymous">
<link rel="preload" href="{{ "katex/fonts/KaTeX_Size1-Regular.woff2" | relURL }}" as="font" type="font/woff2" crossorigin="anonymous">

<link rel="stylesheet" href="{{ $katex_css }}">
<script defer src="{{ $katex_js }}"></script>
<script defer src="{{ $katex_auto_render }}"
    onload="renderMathInElement(document.body, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError : false
    });"></script>
{{- end }}
