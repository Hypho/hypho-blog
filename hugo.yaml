baseURL: 'https://your-username.github.io/'
languageCode: 'zh-cn'
title: 'Hypho'
theme: ['PaperMod']

params:
  env: 'production'
  title: 'Hypho'
  description: '关于 AI、SEO/GEO 及未来信息发现的极简思考'
  keywords: ['AI', 'GEO', 'SEO', 'Generative AI', 'Deep Learning', 'Blog']
  author: 'Hypho'
  
  # 风格设置
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  math: true # 开启 KaTeX 数学公式支持

  # SEO & Social Media
  images: ["papermod-cover.png"] # 默认 Open Graph 图片 (放在 static 目录下)

  # 页脚设置
  hideFooter: false # 保留页脚，但下面会隐藏冗余信息
  disableCopyright: false
  # 通过隐藏 "Powered by" 保持纯粹
  # PaperMod 允许通过 params 配置简化
  ShowFullTextinRSS: true
  
  # 额外细节
  ShowToc: true
  TocOpen: false # 默认折叠目录，让页面更干净
  
  # 首页设置 (极简主义风格)
  homeInfoParams:
    Title: "Hypho"
    Content: '个人思考'

  # 社交链接 (保留必要项)
  socialIcons:
    - name: github
      url: "https://github.com/"
    - name: rss
      url: "index.xml"

  # 搜索配置
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# 菜单设置 (移除 Emoji，保持文字简洁)
menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 40

# 搜索功能支持
outputs:
  home:
    - HTML
    - RSS
    - JSON

# 渲染优化
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: github-light # 切换为更清爽的代码高亮风格

# SEO 优化
canonifyURLs: true
relativeURLs: false
