baseURL: 'https://blog.hypho.cn/'
languageCode: 'zh-cn'
title: 'Hypho'
theme: ['PaperMod']

params:
  env: 'production'
  title: 'Hypho'
  description: '聚焦 AI、Agent、SEO/GEO 与信息发现的中文技术博客，记录工具评测、研究解读与工程实践。'
  keywords: ['AI', 'GEO', 'SEO', 'Generative AI', 'Deep Learning', 'Blog']
  author: 'Hypho'
  
  analytics:
    google:
      SiteVerificationTag: "jAmYAvL3Y5Vob1EkljB7viQInTPTU6RJEIOpuIxE-54"
  
  schema:
    publisherType: Person
    sameAs:
      - "https://github.com/Hypho"

  # 风格设置
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowScrollProgressBar: true  # 文章阅读进度条
  math: true # 开启 KaTeX 数学公式支持

  # 自定义 CSS
  customCSS: ["css/custom.css"]

  # SEO & Social Media
  images: ["papermod-cover.png"] # 默认 Open Graph 图片 (放在 static 目录下)

  # 页脚设置
  hideFooter: false # 保留页脚，但下面会隐藏冗余信息
  disableCopyright: false
  # 通过隐藏 "Powered by" 保持纯粹
  # PaperMod 允许通过 params 配置简化
  ShowFullTextinRSS: true
  
  # 额外细节
  ShowToc: true
  TocOpen: false # 默认折叠目录，让页面更干净
  
  # 首页设置 (极简主义风格)
  homeInfoParams:
    Title: "Hypho"
    Content: '聚焦 AI、Agent、SEO/GEO 与信息发现的中文技术博客。这里发布工具评测、研究解读与工程实践，优先让文章页成为搜索入口。'

  # 社交链接 (保留必要项)
  socialIcons:
    - name: github
      url: "https://github.com/Hypho"
    - name: rss
      url: "index.xml"

  # 搜索配置
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# 菜单设置 (移除 Emoji，保持文字简洁)
menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: about
      name: 关于
      url: /about/
      weight: 40

# 搜索功能支持
outputs:
  home:
    - HTML
    - RSS
    - JSON

# 渲染优化
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: dracula   # 代码高亮主题（暗色，与网站整体风格统一）

# SEO 优化
canonifyURLs: true
relativeURLs: false

# 站点地图
sitemap:
  changefreq: weekly
  priority: 0.7
  filename: sitemap.xml

# 文章永久链接：/posts/slug/（从文件名取 slug，无中文）
permalinks:
  posts: /posts/:contentbasename/

